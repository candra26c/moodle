services:
  moodle-web:
    image: nginx:alpine
    depends_on:
      - moodle-php
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80" # Coolify Traefik handles the HTTPS/domain mapping
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  moodle-php:
    build: .
    volumes:
      - moodledata:/var/www/moodledata
    environment:
      - MOODLE_URL=${MOODLE_URL}
      - MOODLE_DB_HOST=moodle-db
      - MOODLE_DB_NAME=moodle
      - MOODLE_DB_USER=moodle
      - MOODLE_DB_PASSWORD=${MOODLE_DB_PASSWORD}
      - REDIS_HOST=moodle-redis
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '6.0'    
          memory: 10G    

  moodle-redis:
    image: redis:alpine
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2.5G

  moodle-db:
    # Upgraded to PG 16 for better JSON/Query performance in Moodle 5.x
    image: postgres:16-alpine 
    environment:
      POSTGRES_DB: moodle
      POSTGRES_USER: moodle
      POSTGRES_PASSWORD: ${MOODLE_DB_PASSWORD}
    volumes:
      - moodle_db_data:/var/lib/postgresql/data
    command: postgres -c max_connections=400 -c shared_buffers=2GB -c work_mem=32MB
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '3.0'    
          memory: 6G     

volumes:
  moodledata:
  moodle_db_data: