services:

  # ─────────────────────────────────────────────
  # Nginx — serves static files & proxies PHP-FPM
  # Web root: /var/www/moodle/public (Moodle 5.1+)
  # ─────────────────────────────────────────────
  moodle-web:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    depends_on:
      moodle-php:
        condition: service_healthy              # wait until PHP-FPM passes its healthcheck
    volumes:
      - moodle_app:/var/www/moodle:ro          # shared read-only — serve static files
      - moodledata:/var/www/moodledata:ro       # needed for file download serving
    ports:
      - "80"                                    # Coolify Traefik maps domain → this port
    mem_limit: 512m
    cpus: "1.0"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # PHP-FPM — runs Moodle application code
  # ─────────────────────────────────────────────
  moodle-php:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - moodle_app:/var/www/moodle              # shared with nginx and cron
      - moodledata:/var/www/moodledata          # persistent uploads/sessions
    environment:
      - MOODLE_URL=${MOODLE_URL}
      - MOODLE_LOCAL_URL=${MOODLE_LOCAL_URL:-}
      - MOODLE_LOCAL_HOST=${MOODLE_LOCAL_HOST:-}
      - MOODLE_DB_HOST=moodle-db
      - MOODLE_DB_NAME=${MOODLE_DB_NAME:-moodle}
      - MOODLE_DB_USER=${MOODLE_DB_USER:-moodle}
      - MOODLE_DB_PASSWORD=${MOODLE_DB_PASSWORD}
      - REDIS_HOST=moodle-redis
    mem_limit: 8g
    cpus: "4.0"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # Moodle Cron — REQUIRED. Handles quiz autosave,
  # grade calculations, notifications, backups.
  # Runs php admin/cli/cron.php every 60 seconds.
  # ─────────────────────────────────────────────
  moodle-cron:
    build:
      context: .
      dockerfile: Dockerfile
    command: /usr/local/bin/moodle-cron.sh
    volumes:
      - moodle_app:/var/www/moodle
      - moodledata:/var/www/moodledata
    environment:
      - MOODLE_URL=${MOODLE_URL}
      - MOODLE_LOCAL_URL=${MOODLE_LOCAL_URL:-}
      - MOODLE_LOCAL_HOST=${MOODLE_LOCAL_HOST:-}
      - MOODLE_DB_HOST=moodle-db
      - MOODLE_DB_NAME=${MOODLE_DB_NAME:-moodle}
      - MOODLE_DB_USER=${MOODLE_DB_USER:-moodle}
      - MOODLE_DB_PASSWORD=${MOODLE_DB_PASSWORD}
      - REDIS_HOST=moodle-redis
    mem_limit: 1g
    cpus: "1.0"
    restart: unless-stopped
    depends_on:
      moodle-db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # Redis — session store & application cache
  # ─────────────────────────────────────────────
  moodle-redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy volatile-lru
      --save ""
      --appendonly no
    mem_limit: 2560m
    cpus: "1.0"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # PostgreSQL 16 — main database
  # utf8 / C locale required by Moodle
  # ─────────────────────────────────────────────
  moodle-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${MOODLE_DB_NAME:-moodle}
      POSTGRES_USER: ${MOODLE_DB_USER:-moodle}
      POSTGRES_PASSWORD: ${MOODLE_DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - moodle_db_data:/var/lib/postgresql/data
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=1GB
      -c effective_cache_size=3GB
      -c work_mem=16MB
      -c maintenance_work_mem=256MB
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MOODLE_DB_USER:-moodle} -d ${MOODLE_DB_NAME:-moodle}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 4g
    cpus: "2.0"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  moodle_app:        # Moodle PHP codebase — shared between web, php, cron
  moodledata:        # Moodle dataroot — user uploads, sessions, temp files
  moodle_db_data:    # PostgreSQL persistent data