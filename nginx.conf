server {
    listen 80;
    server_name _;

    # ─────────────────────────────────────────
    # Moodle 5.1+: web root is the public/ subdir
    # ─────────────────────────────────────────
    root  /var/www/moodle/public;
    index index.php index.html;

    client_max_body_size 500M;
    client_body_timeout  300s;

    # ─────────────────────────────────────────
    # Gzip compression — reduces page load ~70% for text assets
    # ─────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json
        application/xml application/xml+rss
        image/svg+xml font/truetype font/opentype
        application/vnd.ms-fontobject;

    # ─────────────────────────────────────────
    # Forward real client IP from Coolify/Traefik
    # ─────────────────────────────────────────
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  10.0.0.0/8;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ─────────────────────────────────────────
    # Security headers
    # ─────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-Frame-Options         "SAMEORIGIN"       always;
    add_header X-XSS-Protection        "1; mode=block"    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ─────────────────────────────────────────
    # Block access to sensitive Moodle paths
    # ─────────────────────────────────────────
    location ~ ^/(config\.php|\.git|composer\.json|\.env) {
        deny all;
        return 404;
    }

    location ~ /\.ht {
        deny all;
    }

    # ─────────────────────────────────────────
    # PHP-FPM passthrough — MUST come before static asset rules.
    # Moodle serves JS/CSS/images dynamically through PHP:
    #   /lib/javascript.php/...  → RequireJS, javascript-static.js
    #   /theme/styles.php/...    → compiled CSS
    #   /pluginfile.php/...      → user-uploaded images and files
    # If static asset rules came first, these .js/.css/.png URLs
    # would match the extension rules and return 404 instead of
    # being routed to PHP-FPM.
    # ─────────────────────────────────────────
    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass   moodle-php:9000;
        fastcgi_index  index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME         $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO               $fastcgi_path_info;
        fastcgi_param HTTPS                   on;
        fastcgi_param HTTP_X_FORWARDED_PROTO  https;
        fastcgi_param HTTP_HOST               $host;

        fastcgi_read_timeout    300;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout    300;

        # Retry on connection errors so nginx recovers automatically
        # if PHP-FPM is slow to start or temporarily unavailable.
        fastcgi_next_upstream   error timeout;

        fastcgi_buffer_size       128k;
        fastcgi_buffers           8 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ─────────────────────────────────────────
    # Main location — try static, fallback to PHP
    # ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─────────────────────────────────────────
    # Static assets — only reached for URLs with no .php in path.
    # Real static files (AMD modules, theme CSS, fonts, images).
    # ─────────────────────────────────────────
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
        access_log off;
    }
}
