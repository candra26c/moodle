server {
    listen 80;
    server_name _;

    # ─────────────────────────────────────────
    # Moodle 5.1+: web root is the public/ subdir
    # NOT the repo root
    # ─────────────────────────────────────────
    root /var/www/moodle/public;
    index index.php index.html;

    client_max_body_size 500M;
    client_body_timeout  300s;

    # ─────────────────────────────────────────
    # Forward real client IP from Coolify/Traefik
    # ─────────────────────────────────────────
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  10.0.0.0/8;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ─────────────────────────────────────────
    # Security headers
    # ─────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-Frame-Options         "SAMEORIGIN"        always;
    add_header X-XSS-Protection        "1; mode=block"     always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ─────────────────────────────────────────
    # Block access to sensitive Moodle paths
    # ─────────────────────────────────────────
    location ~ ^/(config\.php|\.git|composer\.json|\.env) {
        deny all;
        return 404;
    }

    location ~ /\.ht {
        deny all;
    }

    # ─────────────────────────────────────────
    # Static files — try to serve directly first.
    # If not found, fall through to PHP (Moodle
    # serves fonts/js dynamically via .php handlers)
    # ─────────────────────────────────────────
    location ~* \.(ico|png|jpg|jpeg|gif|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ @php;
    }

    location @php {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass   moodle-php:9000;
        fastcgi_index  index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO        $fastcgi_path_info;
        fastcgi_param HTTPS            on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_HOST        $host;
        fastcgi_read_timeout    300;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout    300;
        fastcgi_buffer_size          128k;
        fastcgi_buffers              8 256k;
        fastcgi_busy_buffers_size    256k;
    }

    # ─────────────────────────────────────────
    # Main location — try static, fallback to PHP
    # ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─────────────────────────────────────────
    # PHP-FPM passthrough
    # ─────────────────────────────────────────
    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass   moodle-php:9000;
        fastcgi_index  index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO        $fastcgi_path_info;

        # Forward protocol so Moodle generates https:// URLs
        fastcgi_param HTTPS            on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_HOST        $host;

        fastcgi_read_timeout    300;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout    300;

        fastcgi_buffer_size          128k;
        fastcgi_buffers              8 256k;
        fastcgi_busy_buffers_size    256k;
    }
}
